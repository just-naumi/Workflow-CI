name: Model Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow

      - name: Run MLflow Project
        id: run_mlflow
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          cd MLProject
          # Menjalankan retraining otomatis via MLflow
          mlflow run . 

          # Mengambil RUN_ID terbaru untuk build docker
          RUN_ID=$(mlflow runs list --experiment-id 0 --max-results 1 | awk 'NR==3 {print $1}')
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV

      - name: Build Docker Image
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          # Ganti 'just-naumi' dengan username Docker Hub lu
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n just-naumi/credit-model:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push just-naumi/credit-model:latest
