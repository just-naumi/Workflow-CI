name: Model Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting CI job..."

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn dagshub

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          python -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          experiment = client.get_experiment_by_name('Latihan Credit Scoring')
          if experiment is None:
              runs = client.search_runs(experiment_ids=['0'], order_by=['start_time DESC'], max_results=1)
          else:
              runs = client.search_runs(experiment_ids=[experiment.experiment_id], order_by=['start_time DESC'], max_results=1)
          if not runs:
              raise Exception('Tidak ada run yang ditemukan di MLflow!')
          run_id = runs[0].info.run_id
          print(f'Run ID terbaru: {run_id}')
          with open('run_id.txt', 'w') as f:
              f.write(run_id)
          "

      - name: Install Python dependencies
        run: |
          pip install mlflow scikit-learn pandas

      - name: Upload to GitHub
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "Menyimpan run_id: $RUN_ID ke repository"
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          echo "$RUN_ID" > latest_run_id.txt
          git add latest_run_id.txt
          git commit -m "Update latest MLflow run_id: $RUN_ID" || echo "Tidak ada perubahan untuk di-commit"
          git push || echo "Push gagal atau tidak ada perubahan"

      - name: Download Model Artifacts from DagsHub
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "Mendownload artifact model dari DagsHub untuk Run ID: $RUN_ID"
          python -c "
          import mlflow
          import os

          run_id = open('run_id.txt').read().strip()
          print(f'Downloading artifacts for run: {run_id}')

          # Download artifact 'model' ke folder lokal ./model_artifacts
          local_path = mlflow.artifacts.download_artifacts(
              run_id=run_id,
              artifact_path='model',
              dst_path='./model_artifacts'
          )
          print(f'Artifact berhasil didownload ke: {local_path}')
          # Simpan path ke file untuk digunakan step berikutnya
          with open('model_local_path.txt', 'w') as f:
              f.write(local_path)
          "
          echo "Isi folder model_artifacts:"
          ls -la model_artifacts/

      - name: Build Docker Model
        run: |
          MODEL_PATH=$(cat model_local_path.txt)
          echo "Building Docker dari local path: $MODEL_PATH"
          mlflow models build-docker \
            --model-uri "$MODEL_PATH" \
            --name "credit-model" \
            --env-manager=local

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker Image
        run: |
          docker tag credit-model ${{ secrets.DOCKER_USERNAME }}/credit-model:latest

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/credit-model:latest

      - name: Post Log in to Docker Hub
        if: always()
        run: echo "Docker Hub logout selesai."

      - name: Post Set up Python 3.12.7
        if: always()
        run: echo "Python teardown selesai."

      - name: Post Run actions/checkout@v3
        if: always()
        run: echo "Checkout post-step selesai."

      - name: Complete job
        run: echo "CI job selesai dengan sukses!"
