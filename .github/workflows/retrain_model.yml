name: Model Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Set up job
        run: echo "Starting CI job..."

      - name: Run actions/checkout@v3
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Check Env
        run: |
          python --version
          pip --version

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn dagshub

      - name: Run mlflow project
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          cd MLProject
          mlflow run . --env-manager=local

      - name: Get latest MLflow run_id
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          python -c "
import mlflow; 
client = mlflow.tracking.MlflowClient(); 
runs = client.search_runs(experiment_ids=['0'], order_by=['start_time DESC'], max_results=1); 
with open('run_id.txt', 'w') as f:
    f.write(runs[0].info.run_id)
"

      - name: Build Docker Model
        env:
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          RUN_ID=$(cat run_id.txt)
          echo "Building docker for Run ID: $RUN_ID"
          echo "Waiting for DagsHub to sync artifacts..."
          sleep 15
          mlflow models build-docker --model-uri "runs:/$RUN_ID/model" --name "mnaufalhazmi/credit-model:latest" --env-manager=local

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: docker push mnaufalhazmi/credit-model:latest