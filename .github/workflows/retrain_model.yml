name: Model Retraining CI

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"

jobs:
  train-model:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v4
        with:
          python-version: "3.12.7"

      - name: Install MLflow
        run: |
          python -m pip install --upgrade pip
          pip install mlflow pandas scikit-learn dagshub

      - name: Run MLflow Project
        id: run_mlflow
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_USER_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          cd MLProject
          # Jalankan training
          mlflow run . --env-manager=local

          # CARA PALING AKURAT: Gunakan Python untuk mencari ID run terbaru di experiment tersebut
          RUN_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); runs = client.search_runs(experiment_ids=['0'], order_by=['start_time DESC'], max_results=1); print(runs[0].info.run_id)")

          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "RUN_ID hasil deteksi: $RUN_ID"

      - name: Build Docker Image
        env:
          MLFLOW_TRACKING_USERNAME: ${{ secrets.DAGSHUB_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.DAGSHUB_TOKEN }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_USERNAME }}/Eksperimen_SML_naumi.mlflow"
        run: |
          # Validasi apakah RUN_ID kosong
          if [ -z "${{ env.RUN_ID }}" ]; then
            echo "Error: RUN_ID tidak ditemukan!"
            exit 1
          fi

          # Eksekusi build dengan path yang benar
          mlflow models build-docker -m "runs:/${{ env.RUN_ID }}/model" -n just-naumi/credit-model:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker push just-naumi/credit-model:latest
